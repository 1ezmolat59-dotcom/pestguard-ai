services:
  - type: web
    name: pestguard-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 10000
      - key: COOKIE_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false   # Set this manually in Render dashboard
